# Static relay page for the Slack OAuth PKCE callback.
name: Deploy relay to GitHub Pages

# Publishes the relay/ folder (the OAuth callback relay page) to GitHub Pages.
# Served at https://<owner>.github.io/slack-pkce-auth/callback.html

on:
  push:
    branches: [master]
    paths:
      - 'relay/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: relay
      - id: deployment
        uses: actions/deploy-pages@v4
