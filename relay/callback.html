<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>slack-pkce-auth — OAuth Callback</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-align: center; padding: 60px 20px; color: #333; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #4A154B; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { font-size: 18px; margin: 20px 0; }
  .error { color: #d32f2f; }
  code { background: #f5f5f5; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
</style>
</head>
<body>
<h2>slack-pkce-auth</h2>
<div id="status" class="status"><span class="spinner"></span>Returning to terminal...</div>
<script>
(function() {
  var params = window.location.search;
  if (!params) {
    document.getElementById('status').innerHTML = '<span class="error">No OAuth parameters received.</span>';
    return;
  }
  // Forward query string to the local listener.
  // Default port 8765 — override via ?relay_port=NNNN appended by the CLI if needed.
  var url = new URL(window.location.href);
  var port = url.searchParams.get('relay_port') || '8765';
  // Strip our own relay_port param from the forwarded query
  url.searchParams.delete('relay_port');
  var localUrl = 'http://localhost:' + port + '/slack/callback' + (url.search || '');
  window.location.href = localUrl;

  setTimeout(function() {
    document.getElementById('status').innerHTML =
      '<span class="error">Could not reach the local CLI listener.</span>' +
      '<p>Is <code>slack-pkce-auth</code> still running?</p>' +
      '<p>Expected URL: <code>' + localUrl + '</code></p>';
  }, 3000);
})();
</script>
</body>
</html>
